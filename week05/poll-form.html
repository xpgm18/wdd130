<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Form ExerciseAbout</title>
    <!-- <link rel="stylesheet" href="styles/table.css"> -->
    <meta name="description" content="Form Exercise">
    <meta name="author" content="Geoffrey David McIntyre">
</head>

<body>

    <header>
        <h1>WDD 130 | HTML Form - User Poll</h1>
    </header>

    <main>
        <form>
            <label for="fullname">Full Name:</label>
            <input type="text" id="fullname" name="fullname" required>

            <label for="useremail">Email:</label>
            <input type="email" id="useremail" name="useremail" required>

            <label for="browser">What is your favorite internet browser?</label>
            <select name="browser" id="browser">
                <option value="firefox">Firefox</option>
                <option value="chrome">Chrome</option>
                <option value="safari">Safari</option>
                <option value="edge">Edge</option>
                <option value="other">Other</option>
            </select>

            <label for="pet">Do you have a household pet?</label>
            <input type="checkbox" id="pet" name="pet">

            <label for="feedback">List the places you have lived</label>
            <textarea name="feedback" id="feedback" rows="4"
              placeholder="Vienna Austria, Amsterdam Holland, Montreal Canada, Barre Vermont"></textarea>

            <button type="submit">Submit Poll</button>
        </form>
    </main>

    <footer>

    </footer>
</body>

</html>
