<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact Us Whitewater Rafting High Adventure Utah</title>
    <link rel="stylesheet" href="styles/rafting.css">
    <meta name="description"
      content="Provides contact information for Utah's Whitewater rafting and high adventure trips">
    <meta name="author" content="Geoffrey David McIntyre">
</head>

<body>
    <header>
        <img src="images/z-wwr-oars.png" alt="Utah White Rafting Logo">
        <nav>
            <ul class="navigation">
                <li><a href="index.html">Home</a></li>
                <li><a href="about.html">About Us</a></li>
                <li><a href="trips.html">Trips</a></li>
                <li><a href="contact.html">Contact Us</a></li>
            </ul>
        </nav>
    </header>
    <main>
        <div class="centered-headers">
            <h1>White Water Rafting Company</h1>
            <h2>123 Main River Street</h2>
            <h2>Kolob, California</h2>
            <h2>+1 999-999-9999</h2>
            <h2>info@whitewater.com</h2>
        </div>
        <section class="contact-grid">
            <iframe
              src="https://www.google.com/maps/embed?pb=!1m14!1m12!1m3!1d124540.94120962577!2d-122.1809846560897!3d40.782368703715804!2m3!1f0!2f0!3f0!3m2!1i1024!2i768!4f13.1!5e0!3m2!1sen!2sus!4v1780539320535!5m2!1sen!2sus"
              allowfullscreen="" loading="lazy" referrerpolicy="no-referrer-when-downgrade">
            </iframe>
            <form action="#">
                <fieldset class="form">
                    <div class="contact-side-by-side">
                        <label for="name">Name</label>
                        <input type="text" id="name" name="name" placeholder="Placeholder" required>
                        <label for="email">Email</label>
                        <input type="text" name="email" id="email" placeholder="Placeholder"
                          required>
                    </div>
                    <fieldset class="contact-side-by-side-radio">
                        <p>Message Purpose</p>
                        <div class="radio-group">
                            <input type="radio" name="purpose" id="general" value="general"
                              required>
                            <label for="general">General Inquiry</label>
                        </div>
                        <div class="radio-group">
                            <input type="radio" name="purpose" id="question" value="question">
                            <label for="question">Reservation Question</label>
                        </div>
                        <div class="radio-group">
                            <input type="radio" name="purpose" id="suggestion" value="suggestion">
                            <label for="suggestion">Website Suggestion</label>
                        </div>
                    </fieldset>

                    <div class="contact-over-and-under">
                        <label for="message">Message</label>
                        <textarea name="message" id="message" rows="3" required
                          placeholder="Type here"></textarea>
                    </div>
                    <div>
                        <input type="checkbox" id="newsletter" name="newsletter" checked>
                        <label for="newsletter">Please subscribe me to the monthly
                            newsletter</label>
                    </div>
                    <button type="submit">Get in Touch!</button>
                </fieldset>
            </form>
        </section>
        <section class="contact-employees">
            <h2>We are Here to Serve You</h2>
            <figure>
                <img src="images/employee.jpg" alt="Geoffrey McIntyre">
                <figcaption>Geoffrey McIntyre -Transportation Manager</figcaption>
            </figure>
            <figure>
                <img src="images/sherry.jpg" alt="Sherry Smith">
                <figcaption>Sherry Smith - Trip Manager</figcaption>
            </figure>
            <figure>
                <img src="images/executive.jpg" alt="Jay Jones">
                <figcaption>Jay Jones - CFO</figcaption>
            </figure>
        </section>
    </main>
    <footer>
        <p>&copy;2026 Utah Whiterafting and High Adventure Trips, Geoffrey McIntyre, Utah</p>
        <nav class="socialmedia">
            <a href="https://facebook.com">
                <img src="images/facebook-logo.jpg" alt="Facebook Icon">
            </a>
            <a href="https://linkedin.com">
                <img src="images/linkedin-logo.jpg" alt="LinkedIn Icon">
            </a>
            <a href="https://instagram.com">
                <img src="images/instagram-logo.png" alt="Instagram Icon">
            </a>
        </nav>
    </footer>

</body>

</html>
